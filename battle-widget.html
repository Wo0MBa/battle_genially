<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>RPG Battle Arena</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
  <style>
    /* Полное избавление от черных полос: вешаем фон на body в режиме cover */
    body, html { 
      margin: 0; 
      padding: 0; 
      width: 100%; 
      height: 100%; 
      overflow: hidden; 
      background-color: #000; 
      background-position: center; 
      background-size: cover; 
      background-repeat: no-repeat; 
      font-family: 'Segoe UI', Tahoma, sans-serif; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      position: relative; 
      transition: background-image 0.2s ease-in-out;
    }
    
    /* Эффект вспышки поверх всего экрана */
    #flash-overlay { position: absolute; inset: 0; background: white; opacity: 0; z-index: 150; pointer-events: none; }
    .screen-flash { animation: flashScreen 0.35s ease-out; }
    @keyframes flashScreen { 0% { opacity: 0.75; } 100% { opacity: 0; } }

    /* Эффект тряски всего экрана */
    .screen-shake { animation: shakeScreen 0.35s ease-in-out; }
    @keyframes shakeScreen { 
      0%, 100% { transform: translate(0, 0); } 
      20% { transform: translate(-8px, 6px); } 
      40% { transform: translate(8px, -6px); } 
      60% { transform: translate(-6px, -6px); } 
      80% { transform: translate(6px, 6px); } 
    }

    /* Игровое окно строго разделено, контент прозрачный и накладывается сверху */
    #game-window { position: relative; width: 1200px; height: 700px; overflow: hidden; flex-shrink: 0; z-index: 10; background: transparent; }
    
    /* Контейнеры персонажей приподняты, чтобы не пересекаться с панелью вопросов */
    .char-container { position: absolute; bottom: 270px; width: 300px; height: 350px; display: flex; flex-direction: column; align-items: center; z-index: 50; }
    .char-sprite { width: 100%; height: 100%; position: relative; display: flex; justify-content: center; align-items: flex-end; }
    .char-container img { max-width: 100%; max-height: 100%; object-fit: contain; filter: drop-shadow(0 15px 10px rgba(0,0,0,0.6)); transform-origin: bottom center; }
    
    #hero-layer { left: 100px; }
    #villain-layer { right: 100px; }

    /* Эффект магической вспышки удара */
    .hit-fx { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); width: 220px; height: 220px; background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,140,0,0.85) 35%, rgba(255,0,0,0.5) 65%, rgba(0,0,0,0) 85%); z-index: 65; pointer-events: none; opacity: 0; mix-blend-mode: screen; }
    .play-hit { animation: hitExplosion 0.4s ease-out forwards; }
    @keyframes hitExplosion { 
      0% { transform: translate(-50%, -50%) scale(0.2); opacity: 1; filter: brightness(2.5); } 
      50% { transform: translate(-50%, -50%) scale(1.4); opacity: 0.9; } 
      100% { transform: translate(-50%, -50%) scale(2.2); opacity: 0; } 
    }
    
    /* Панели сердечек */
    .hearts-wrapper { display: flex; gap: 4px; margin-bottom: 15px; background: rgba(0,0,0,0.75); padding: 6px 14px; border-radius: 20px; border: 2px solid rgba(255,255,255,0.25); box-shadow: 0 6px 12px rgba(0,0,0,0.6); flex-wrap: wrap; justify-content: center; max-width: 90%; }
    .heart { font-size: 22px; text-shadow: 0 2px 4px #000; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .heart.dead { filter: grayscale(100%) brightness(0.25); transform: scale(0.65); opacity: 0.5; }

    /* Панель заданий: СТИЛЬ - ЧИСТО ЧЕРНЫЙ ФОН, БЕЛЫЙ ТЕКСТ */
    #task-panel { 
      position: absolute; 
      bottom: 20px; 
      left: 50%; 
      transform: translateX(-50%); 
      width: 92%; 
      max-width: 1050px; 
      background: #000000; /* Чисто черный цвет */
      border: 3px solid #00bfff; /* Голубая неоновая рамка */
      border-radius: 16px; 
      padding: 30px; 
      box-shadow: 0 0 35px rgba(0,191,255,0.35); 
      z-index: 100; 
      text-align: center; 
      color: #ffffff; /* Чисто белый текст */
      box-sizing: border-box; 
      transition: opacity 0.3s;
    }
    #q-text { margin: 0 0 22px 0; font-size: 26px; font-weight: bold; text-shadow: 0 2px 5px #000; color: #ffffff; }
    .answers-grid { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; }
    
    .answer-btn { 
      background: #111; 
      border: 2px solid #00bfff; 
      color: #ffffff; 
      padding: 14px 28px; 
      font-size: 19px; 
      border-radius: 10px; 
      cursor: pointer; 
      transition: all 0.2s ease; 
      font-weight: bold; 
      min-width: 200px; 
    }
    .answer-btn:hover { background: #00bfff; color: #000000; transform: translateY(-3px); box-shadow: 0 6px 18px rgba(0,191,255,0.45); }
    .answer-btn:disabled { pointer-events: none; opacity: 0.8; }

    /* --- RPG АНИМАЦИИ ДРАКИ --- */
    @keyframes heroDash {
      0% { transform: translateX(0) rotate(0); }
      15% { transform: translateX(-50px) rotate(-6deg); } /* Динамичный замах назад */
      45% { transform: translateX(570px) rotate(12deg) scale(1.15); } /* Молниеносный выпад вперед */
      70% { transform: translateX(570px) rotate(12deg) scale(1.15); } /* Стоп-кадр удара */
      100% { transform: translateX(0) rotate(0); } /* Возврат на позицию */
    }
    .hero-attack { animation: heroDash 0.85s cubic-bezier(0.25, 1, 0.5, 1) forwards; z-index: 85; }
    
    @keyframes villainDash {
      0% { transform: translateX(0) rotate(0); }
      15% { transform: translateX(50px) rotate(6deg); }
      45% { transform: translateX(-570px) rotate(-12deg) scale(1.15); }
      70% { transform: translateX(-570px) rotate(-12deg) scale(1.15); }
      100% { transform: translateX(0) rotate(0); }
    }
    .villain-attack { animation: villainDash 0.85s cubic-bezier(0.25, 1, 0.5, 1) forwards; z-index: 85; }

    /* Анимации отбрасывания при получении урона */
    @keyframes knockbackRight {
      0% { transform: translateX(0); filter: brightness(1); }
      20% { transform: translateX(90px) rotate(12deg); filter: brightness(2.5) saturate(4) cubic-bezier(0, 0, 0.2, 1) drop-shadow(0 0 25px red); } 
      100% { transform: translateX(0); filter: brightness(1); }
    }
    .damaged-right { animation: knockbackRight 0.55s ease-out; }

    @keyframes knockbackLeft {
      0% { transform: translateX(0); filter: brightness(1); }
      20% { transform: translateX(-90px) rotate(-12deg); filter: brightness(2.5) saturate(4) cubic-bezier(0, 0, 0.2, 1) drop-shadow(0 0 25px red); }
      100% { transform: translateX(0); filter: brightness(1); }
    }
    .damaged-left { animation: knockbackLeft 0.55s ease-out; }

    /* Окна Победы и Поражения */
    .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(6px); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200; color: white; display: none; }
    .modal h1 { font-size: 75px; margin: 0 0 15px 0; text-align: center; }
    
    /* Точный кастомный текст победы */
    #victory-screen h1 { color: #00ff00; text-shadow: 0 0 35px rgba(0,255,0,0.7); }
    #defeat-screen h1 { color: #ff3333; text-shadow: 0 0 35px rgba(255,51,51,0.7); }
    
    .restart-btn { background: #ffffff; color: #000000; padding: 16px 45px; font-size: 24px; font-weight: bold; border-radius: 12px; cursor: pointer; border: none; transition: 0.3s; margin-top: 25px; box-shadow: 0 5px 15px rgba(255,255,255,0.2); }
    .restart-btn:hover { background: #00bfff; color: #ffffff; transform: scale(1.08); box-shadow: 0 5px 20px rgba(0,191,255,0.5); }
  </style>
</head>
<body>

  <div id="flash-overlay"></div>
  
  <div id="game-window">
    <div class="char-container" id="hero-layer">
      <div class="hearts-wrapper" id="hero-hearts"></div>
      <div class="char-sprite" id="hero-sprite">
        <div class="hit-fx" id="hero-fx"></div>
        <img id="hero-img" src="">
      </div>
    </div>

    <div class="char-container" id="villain-layer">
      <div class="hearts-wrapper" id="villain-hearts"></div>
      <div class="char-sprite" id="villain-sprite">
        <div class="hit-fx" id="villain-fx"></div>
        <img id="villain-img" src="">
      </div>
    </div>

    <div id="task-panel">
      <h2 id="q-text">Инициализация боевой арены...</h2>
      <div class="answers-grid" id="q-answers"></div>
    </div>

    <div id="victory-screen" class="overlay">
      <div class="modal">
        <h1>Победа! Поздравляю! 🎉</h1>
        <p style="font-size: 32px; color: #e0e0e0; text-align: center; margin: 0;">Враг полностью разгромлен!</p>
      </div>
    </div>

    <div id="defeat-screen" class="overlay">
      <div class="modal">
        <h1>Поражение! 💀</h1>
        <p style="font-size: 32px; color: #e0e0e0; text-align: center; margin: 0;">Ваш герой исчерпал все силы.</p>
        <center><button class="restart-btn" onclick="location.reload()">Сразиться снова</button></center>
      </div>
    </div>
  </div>

  <script>
    // Автомасштабирование интерфейса поверх адаптивного full-screen фона
    function resizeGame() {
      const game = document.getElementById('game-window');
      const scale = Math.min(window.innerWidth / 1200, window.innerHeight / 700);
      game.style.transform = `scale(${scale})`;
      game.style.transformOrigin = 'center center';
    }
    window.addEventListener('resize', resizeGame);

    let gameData = null;
    const urlParams = new URLSearchParams(window.location.search);
    try {
      const raw = urlParams.get('data');
      if(raw) gameData = JSON.parse(LZString.decompressFromEncodedURIComponent(raw));
    } catch(e) { console.error("Ошибка декомпрессии"); }

    if (!gameData || !gameData.tasks) {
      document.body.innerHTML = "<h2 style='color:white;text-align:center;'>Ошибка: нет данных для запуска арены</h2>";
    } else {
      initGame(gameData);
    }

    function initGame(data) {
      // Привязываем фоновую картинку прямо к body для устранения черных полос по бокам
      document.body.style.backgroundImage = `url(${data.bg})`;
      
      const heroEl = document.getElementById('hero-img');
      const villainEl = document.getElementById('villain-img');
      heroEl.src = data.hero;
      villainEl.src = data.villain;

      const heroSprite = document.getElementById('hero-sprite');
      const villainSprite = document.getElementById('villain-sprite');
      const heroFx = document.getElementById('hero-fx');
      const villainFx = document.getElementById('villain-fx');
      
      const heroHeartsContainer = document.getElementById('hero-hearts');
      const villainHeartsContainer = document.getElementById('villain-hearts');
      
      const taskPanel = document.getElementById('task-panel');
      const answersContainer = document.getElementById('q-answers');
      const flashOverlay = document.getElementById('flash-overlay');
      
      let currentTaskIndex = 0;
      let totalTasks = data.tasks.length;
      
      // ОПТИМИЗАЦИЯ: Одинаковое стартовое количество сердечек на базе вопросов!
      let heroTotalHp = totalTasks; 
      let heroCurrentHp = heroTotalHp;

      let villainTotalHp = totalTasks; 
      let villainCurrentHp = villainTotalHp;

      let isAnimating = false;

      function renderHearts(container, count) {
        container.innerHTML = '';
        for(let i=0; i<count; i++) {
          let h = document.createElement('span');
          h.innerText = '❤️';
          h.className = 'heart';
          container.appendChild(h);
        }
      }
      
      function loseHeart(container, currentHp) {
        let hearts = container.querySelectorAll('.heart');
        if(hearts[currentHp]) {
          hearts[currentHp].classList.add('dead');
        }
      }

      // Генерируем равное число сердечек
      renderHearts(heroHeartsContainer, heroTotalHp);
      renderHearts(villainHeartsContainer, villainTotalHp);
      
      resizeGame();
      loadTask(currentTaskIndex);

      function loadTask(index) {
        if (index >= totalTasks) {
          setTimeout(() => { document.getElementById('victory-screen').style.display = 'flex'; }, 800);
          return;
        }

        const task = data.tasks[index];
        document.getElementById('q-text').innerText = task.question;
        answersContainer.innerHTML = '';
        
        task.options.forEach(opt => {
          const btn = document.createElement('button');
          btn.className = 'answer-btn';
          btn.innerText = opt;
          btn.onclick = () => handleAnswer(opt === task.correct, btn, task.correct);
          answersContainer.appendChild(btn);
        });
      }

      function applyImpactEffects() {
        document.body.classList.add('screen-shake');
        flashOverlay.classList.add('screen-flash');
        setTimeout(() => {
          document.body.classList.remove('screen-shake');
          flashOverlay.classList.remove('screen-flash');
        }, 350);
      }

      function handleAnswer(isCorrect, btnClicked, correctText) {
        if (isAnimating) return;
        isAnimating = true;

        document.querySelectorAll('.answer-btn').forEach(b => b.disabled = true);

        if (isCorrect) {
          btnClicked.style.background = '#00ff00';
          btnClicked.style.color = '#000000';
          btnClicked.style.borderColor = '#00ff00';
          
          // Атакует ГЕРОЙ (динамичный замах + глубокий выпад)
          heroSprite.classList.add('hero-attack');
          
          setTimeout(() => {
            // Момент столкновения (400мс)
            applyImpactEffects();
            villainFx.classList.add('play-hit');
            villainSprite.classList.add('damaged-right');
            
            villainCurrentHp--;
            loseHeart(villainHeartsContainer, villainCurrentHp);
            
            setTimeout(() => {
              villainFx.classList.remove('play-hit');
              villainSprite.classList.remove('damaged-right');
            }, 500);
          }, 400);

          setTimeout(() => {
            heroSprite.classList.remove('hero-attack');
            currentTaskIndex++;
            taskPanel.style.opacity = '0'; 
            
            setTimeout(() => {
              loadTask(currentTaskIndex);
              taskPanel.style.opacity = '1';
              isAnimating = false;
            }, 300);
          }, 850);

        } else {
          btnClicked.style.background = '#ff3333';
          btnClicked.style.borderColor = '#ff3333';
          
          document.querySelectorAll('.answer-btn').forEach(b => {
            if(b.innerText === correctText) { b.style.border = '2px solid #00ff00'; }
          });

          // Атакует ЗЛОДЕЙ
          villainSprite.classList.add('villain-attack');
          
          setTimeout(() => {
            // Момент столкновения
            applyImpactEffects();
            heroFx.classList.add('play-hit');
            heroSprite.classList.add('damaged-left');
            
            heroCurrentHp--;
            loseHeart(heroHeartsContainer, heroCurrentHp);
            
            setTimeout(() => {
              heroFx.classList.remove('play-hit');
              heroSprite.classList.remove('damaged-left');
            }, 500);
          }, 400);

          setTimeout(() => {
            villainSprite.classList.remove('villain-attack');
            
            if (heroCurrentHp <= 0) {
              setTimeout(() => {
                document.getElementById('defeat-screen').style.display = 'flex';
              }, 500);
            } else {
              document.querySelectorAll('.answer-btn').forEach(b => { b.disabled = false; });
              btnClicked.disabled = true; 
              isAnimating = false;
            }
          }, 850);
        }
      }
    }
  </script>
</body>
</html>
